version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: azlapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: azlapp_user
      POSTGRES_PASSWORD: azlapp_password
      POSTGRES_DB: azlapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U azlapp_user -d azlapp']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
